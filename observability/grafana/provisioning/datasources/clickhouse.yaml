apiVersion: 1

datasources:
  - name: Miner ClickHouse
    uid: miner-clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      defaultDatabase: miner
      defaultTable: events
      protocol: http
      host: clickhouse
      port: 8123
      username: "$__env{CLICKHOUSE_USER}"
    secureJsonData:
      password: "$__env{CLICKHOUSE_PASSWORD}"
    isDefault: true

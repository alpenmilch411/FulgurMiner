<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 432" font-family="'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="FulgurMiner hash rate by CPU workers — Apple M5">
  <defs>
    <linearGradient id="fp-native" x1="56" y1="0" x2="740" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A78E2"/><stop offset="1" stop-color="#1F62D6"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="759" height="431" rx="10" fill="#FFFFFF" stroke="#E3E7EE"/>

  <!-- titles -->
  <text x="28" y="34" font-size="18" font-weight="700" fill="#161A20" font-family="'Cinzel', 'Hanken Grotesk', serif" letter-spacing="0.3">FulgurMiner — hashes per second</text>
  <text x="28" y="54" font-size="12.5" fill="#69727E">Apple M5 · 10 cores · macOS 26.5 · Argon2id PoW · full tilt — measured</text>

  <!-- y grid + labels -->
  <g font-size="11" fill="#99A2AE" font-family="'Roboto Mono', ui-monospace, monospace">
    <line x1="56" y1="70"  x2="740" y2="70"  stroke="#EDF0F5"/><text x="48" y="74"  text-anchor="end">600</text>
    <line x1="56" y1="120.3" x2="740" y2="120.3" stroke="#EDF0F5"/><text x="48" y="124.3" text-anchor="end">500</text>
    <line x1="56" y1="170.7" x2="740" y2="170.7" stroke="#EDF0F5"/><text x="48" y="174.7" text-anchor="end">400</text>
    <line x1="56" y1="221"   x2="740" y2="221"   stroke="#EDF0F5"/><text x="48" y="225"   text-anchor="end">300</text>
    <line x1="56" y1="271.3" x2="740" y2="271.3" stroke="#EDF0F5"/><text x="48" y="275.3" text-anchor="end">200</text>
    <line x1="56" y1="321.7" x2="740" y2="321.7" stroke="#EDF0F5"/><text x="48" y="325.7" text-anchor="end">100</text>
    <line x1="56" y1="372"   x2="740" y2="372"   stroke="#D3DAE3"/><text x="48" y="376"   text-anchor="end">0</text>
  </g>
  <text x="16" y="225" font-size="11" fill="#69727E" transform="rotate(-90 16 225)" text-anchor="middle">H/s</text>

  <!-- x labels -->
  <g font-size="11" fill="#69727E" font-family="'Roboto Mono', ui-monospace, monospace" text-anchor="middle">
    <text x="56" y="390">1</text><text x="132" y="390">2</text><text x="208" y="390">3</text>
    <text x="284" y="390">4</text><text x="360" y="390">5</text><text x="436" y="390">6</text>
    <text x="512" y="390">7</text><text x="588" y="390">8</text><text x="664" y="390">9</text><text x="740" y="390">10</text>
  </g>
  <text x="398" y="410" font-size="11.5" fill="#69727E" text-anchor="middle">CPU workers</text>

  <!-- browser (WASM at the browser's default 60% duty) -->
  <polyline fill="none" stroke="#CB4B3C" stroke-width="2" stroke-dasharray="5 4" stroke-linejoin="round"
    points="56,353.4 132,338.3 208,323.2 284,309.6 360,304.6 436,299 512,293 588,287.4 664,283.4 740,283.9"/>

  <!-- WASM full tilt -->
  <polyline fill="none" stroke="#5C93F2" stroke-width="2.4" stroke-linejoin="round"
    points="56,341.3 132,315.6 208,290.5 284,268.3 360,259.3 436,250.2 512,240.1 588,231.1 664,224 740,225.5"/>
  <g fill="#5C93F2">
    <circle cx="56" cy="341.3" r="2.6"/><circle cx="132" cy="315.6" r="2.6"/><circle cx="208" cy="290.5" r="2.6"/><circle cx="284" cy="268.3" r="2.6"/><circle cx="360" cy="259.3" r="2.6"/><circle cx="436" cy="250.2" r="2.6"/><circle cx="512" cy="240.1" r="2.6"/><circle cx="588" cy="231.1" r="2.6"/><circle cx="664" cy="224" r="2.6"/><circle cx="740" cy="225.5" r="2.6"/>
  </g>

  <!-- native full tilt (hero) -->
  <polyline fill="none" stroke="url(#fp-native)" stroke-width="3.2" stroke-linejoin="round"
    points="56,311.1 132,264.3 208,222.5 284,178.7 360,157.1 436,139.5 512,121.8 588,105.2 664,94.2 740,91.6"/>
  <g fill="#1F62D6">
    <circle cx="56" cy="311.1" r="3.1"/><circle cx="132" cy="264.3" r="3.1"/><circle cx="208" cy="222.5" r="3.1"/><circle cx="284" cy="178.7" r="3.1"/><circle cx="360" cy="157.1" r="3.1"/><circle cx="436" cy="139.5" r="3.1"/><circle cx="512" cy="121.8" r="3.1"/><circle cx="588" cy="105.2" r="3.1"/><circle cx="664" cy="94.2" r="3.1"/><circle cx="740" cy="91.6" r="3.1"/>
  </g>
  <text x="734" y="84" font-size="11" font-weight="700" fill="#1F62D6" text-anchor="end" font-family="'Roboto Mono', ui-monospace, monospace">557 H/s</text>

  <!-- legend (top-left, plot is empty there) -->
  <g font-size="12" fill="#3A434F">
    <rect x="70" y="78" width="186" height="68" rx="6" fill="#FFFFFF" stroke="#EDF0F5"/>
    <line x1="82" y1="94"  x2="104" y2="94"  stroke="#1F62D6" stroke-width="3.2"/><circle cx="93" cy="94" r="3.1" fill="#1F62D6"/><text x="112" y="98" font-weight="600">FulgurMiner · native (Rust)</text>
    <line x1="82" y1="112" x2="104" y2="112" stroke="#5C93F2" stroke-width="2.4"/><circle cx="93" cy="112" r="2.6" fill="#5C93F2"/><text x="112" y="116">FulgurMiner · WASM</text>
    <line x1="82" y1="130" x2="104" y2="130" stroke="#CB4B3C" stroke-width="2" stroke-dasharray="5 4"/><text x="112" y="134">Browser tab (WASM, 60%)</text>
  </g>

  <!-- footnote -->
  <text x="28" y="422" font-size="10.5" fill="#99A2AE">Browser line = the same WASM engine at the browser’s default 60% duty cycle.</text>
</svg>
